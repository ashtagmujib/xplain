<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function loadImage(file) {
    return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.src = URL.createObjectURL(file);
    });
}

function drawRoundedImage(img, x, y, w, h, radius) {
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(x + radius, y);
    ctx.lineTo(x + w - radius, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
    ctx.lineTo(x + w, y + h - radius);
    ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
    ctx.lineTo(x + radius, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
    ctx.lineTo(x, y + radius);
    ctx.quadraticCurveTo(x, y, x + radius, y);
    ctx.closePath();
    ctx.clip();

    ctx.drawImage(img, x, y, w, h);
    ctx.restore();
}

function drawShadow(x, y, w, h) {
    ctx.fillStyle = "rgba(0,0,0,0.08)";
    ctx.fillRect(x + 6, y + 12, w, h);
}

async function generate() {
    const beforeFile = document.getElementById("beforeInput").files[0];
    const afterFile = document.getElementById("afterInput").files[0];

    if (!beforeFile || !afterFile) {
        alert("Upload both images");
        return;
    }

    const beforeImg = await loadImage(beforeFile);
    const afterImg = await loadImage(afterFile);

    // Background
    ctx.fillStyle = "#f5f7fa";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const maxHeight = 700;

    function resize(img) {
        const ratio = Math.min(1, maxHeight / img.height);
        return {
            width: img.width * ratio,
            height: img.height * ratio
        };
    }

    const b = resize(beforeImg);
    const a = resize(afterImg);

    const gap = 40;
    const totalWidth = b.width + a.width + gap;

    const startX = (canvas.width - totalWidth) / 2;

    // ✅ Perfect vertical centering
    const centerY = canvas.height / 2;
    const y = centerY - (Math.max(b.height, a.height) / 2);

    // Shadows
    drawShadow(startX, y, b.width, b.height);
    drawShadow(startX + b.width + gap, y, a.width, a.height);

    // Images
    drawRoundedImage(beforeImg, startX, y, b.width, b.height, 20);
    drawRoundedImage(afterImg, startX + b.width + gap, y, a.width, a.height, 20);

    // Labels
    ctx.fillStyle = "#8c96aa";
    ctx.font = "36px Arial";
    ctx.fillText("Before", startX + 10, y - 30);
    ctx.fillText("After", startX + b.width + gap + 10, y - 30);
}

function download() {
    const link = document.createElement("a");
    link.download = "chart.png";
    link.href = canvas.toDataURL();
    link.click();
}
</script>
