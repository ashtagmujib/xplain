<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chart Comparison Generator</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f7fa;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.container {
    text-align: center;
    margin-top: 20px;
}

input {
    margin: 10px;
}

canvas {
    margin-top: 20px;
    border-radius: 20px;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    background: #4a6cf7;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
    <h2>Before / After Chart Generator</h2>
    <input type="file" id="beforeInput" accept="image/*">
    <input type="file" id="afterInput" accept="image/*">
    <br>
    <button onclick="generate()">Generate</button>
    <br>
    <canvas id="canvas" width="1080" height="1350"></canvas>
    <br>
    <button onclick="download()">Download</button>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function loadImage(file) {
    return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.src = URL.createObjectURL(file);
    });
}

function drawRoundedImage(img, x, y, w, h, radius) {
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(x + radius, y);
    ctx.lineTo(x + w - radius, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
    ctx.lineTo(x + w, y + h - radius);
    ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
    ctx.lineTo(x + radius, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
    ctx.lineTo(x, y + radius);
    ctx.quadraticCurveTo(x, y, x + radius, y);
    ctx.closePath();
    ctx.clip();

    ctx.drawImage(img, x, y, w, h);
    ctx.restore();
}

function drawShadow(x, y, w, h) {
    ctx.fillStyle = "rgba(0,0,0,0.1)";
    ctx.fillRect(x + 5, y + 10, w, h);
}

async function generate() {
    const beforeFile = document.getElementById("beforeInput").files[0];
    const afterFile = document.getElementById("afterInput").files[0];

    if (!beforeFile || !afterFile) {
        alert("Upload both images");
        return;
    }

    const beforeImg = await loadImage(beforeFile);
    const afterImg = await loadImage(afterFile);

    // Background
    ctx.fillStyle = "#f5f7fa";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const targetHeight = 600;
    const ratio1 = targetHeight / beforeImg.height;
    const ratio2 = targetHeight / afterImg.height;

    const w1 = beforeImg.width * ratio1;
    const w2 = afterImg.width * ratio2;

    const gap = 40;
    const totalWidth = w1 + w2 + gap;

    const startX = (canvas.width - totalWidth) / 2;
    const y = 400;

    // Shadows
    drawShadow(startX, y, w1, targetHeight);
    drawShadow(startX + w1 + gap, y, w2, targetHeight);

    // Images
    drawRoundedImage(beforeImg, startX, y, w1, targetHeight, 20);
    drawRoundedImage(afterImg, startX + w1 + gap, y, w2, targetHeight, 20);

    // Labels
    ctx.fillStyle = "#8c96aa";
    ctx.font = "40px Arial";
    ctx.fillText("Before", startX + 20, y - 40);
    ctx.fillText("After", startX + w1 + gap + 20, y - 40);
}

function download() {
    const link = document.createElement("a");
    link.download = "chart.png";
    link.href = canvas.toDataURL();
    link.click();
}
</script>

</body>
</html>
